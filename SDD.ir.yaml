    decision: Rename display name to "La Chambre de la Rivière"; keep slug refuge-rider / code RDR-04
    rationale: preserves /contact?chambre= deep link and external references
  ST-02:
    status: locked
    decision: Replace STATS[0] with a worker/proximity stat (e.g. 30 min / des principaux chantiers forestiers)
    rationale: removes "de sentiers VTT à 2 km"; the two matching page-accueil.test.ts literals are re-pinned to the chosen value
  ST-03:
    status: locked
    decision: Only page-accueil.test.ts needs literal edits; le-site/politiques/a-propos/RoomCard suites iterate dynamically or use self-contained mocks
    rationale: verified by inspection — minimizes test churn
  ST-04:
    status: locked
    decision: Contact page needs no copy edit (no adventure wording present)
    rationale: file inspected; grep clean
