STATE:
  ST-01:
    status: locked
    decision: use a lightweight custom rune-based i18n store with no new dependency
    rationale: the site copy is small and static so a full i18n framework is unwarranted
  ST-02:
    status: locked
    decision: interpolation placeholders are percent-delimited tokens such as percent-name-percent
    rationale: keeps dictionaries as plain data and the translate helper trivial with no template compiler
  ST-03:
    status: locked
    decision: the server users.locale is the source of truth on login and session restore while anonymous choices live only in cookie and localStorage
    rationale: authenticated preference should follow the account across devices while anonymous visitors need no server record
  ST-04:
    status: locked
    decision: email locale is resolved at send time from the users table with a French fallback
    rationale: reuses the pipeline existing locale support and safely covers anonymous bookings and lookup failures
  ST-05:
    status: locked
    decision: only email enqueue call sites inside apps/api/src/index.ts are threaded; review-request and OTA-welcome senders keep the French default
    rationale: the task scopes email locale to the index call sites and those other senders are out of scope for this stream
