name: Deploy Production

# Production deploy: API + web (www) and the A/B splitter (dev).
# Runs on every push to main, plus manual dispatch.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Least-privilege GITHUB_TOKEN: deploys use CLOUDFLARE_API_TOKEN (step-scoped),
# not GITHUB_TOKEN, so read-only is sufficient here.
permissions:
  contents: read

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    # CLOUDFLARE_API_TOKEN is scoped to the individual deploy steps below so it
    # is never exposed to install/build lifecycle scripts (npm ci, build).
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Typecheck
        run: npm run typecheck

      # Run the test suite before any deploy so a red build blocks production.
      - name: Test (all workspaces)
        run: npm test --workspaces --if-present

      - name: Build web
        run: npm run build:web

      - name: Deploy HubSpot gateway
        run: npx wrangler deploy
        working-directory: apps/hubspot
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Deploy email-ingest
        run: npx wrangler deploy
        working-directory: apps/email-ingest
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Deploy API (www/api/*, dev+a+b /api/*)
        run: npx wrangler deploy
        working-directory: apps/api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      # Stripe confirm-on-paid needs STRIPE_SECRET_KEY + STRIPE_WEBHOOK_SECRET set
      # as Worker secrets (via `wrangler secret put`, NOT stored in this repo/GH).
      # This lists the deployed worker's secret NAMES (never values) and flags a
      # missing one so payments can't silently go dormant after a rotation/wipe.
      # Currently WARN-only so it can't brick a deploy before the secrets are set.
      # Once they are set, change `MODE=warn` to `MODE=fail` to make it blocking.
      - name: Verify Stripe secrets present on the API worker
        working-directory: apps/api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          MODE: warn
        run: |
          names="$(npx wrangler secret list --format json | node -e 'let d="";process.stdin.on("data",c=>d+=c).on("end",()=>{try{console.log(JSON.parse(d).map(s=>s.name).join(" "))}catch{console.log("")}})')"
          missing=""
          for k in STRIPE_SECRET_KEY STRIPE_WEBHOOK_SECRET; do
            case " $names " in *" $k "*) : ;; *) missing="$missing $k" ;; esac
          done
          if [ -n "$missing" ]; then
            if [ "$MODE" = "fail" ]; then
              echo "::error::Missing Stripe Worker secret(s):$missing — set via 'wrangler secret put'"; exit 1
            else
              echo "::warning::Missing Stripe Worker secret(s):$missing — payments dormant until set via 'wrangler secret put'"
            fi
          else
            echo "Stripe secrets present: STRIPE_SECRET_KEY, STRIPE_WEBHOOK_SECRET"
          fi

      - name: Deploy web (www)
        run: npx wrangler deploy
        working-directory: apps/web
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Deploy A/B splitter (dev)
        run: npx wrangler deploy
        working-directory: apps/ab-splitter
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
