name: Deploy Variant A

# Deploys the path-a front-end variant to a.aubergeduvieuxpont.ca
# (Worker site-web-web-a). Web only — the API is shared from production.
on:
  push:
    branches: [path-a]
  workflow_dispatch:

# Least-privilege GITHUB_TOKEN: the deploy uses CLOUDFLARE_API_TOKEN
# (step-scoped), not GITHUB_TOKEN, so read-only is sufficient here.
permissions:
  contents: read

concurrency:
  group: deploy-path-a
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Gate on the same protected environment as production so CLOUDFLARE_API_TOKEN
    # is only reachable through the environment's protection rules.
    environment: production
    # CLOUDFLARE_API_TOKEN is scoped to the deploy step so it is never exposed
    # to install/build lifecycle scripts.
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build web
        run: npm run build:web

      - name: Deploy variant A (a.aubergeduvieuxpont.ca)
        run: npx wrangler deploy --env a
        working-directory: apps/web
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
