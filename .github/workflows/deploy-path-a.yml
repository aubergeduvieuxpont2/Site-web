name: Deploy Variant A

# Deploys the path-a front-end variant to a.aubergeduvieuxpont.ca
# (Worker site-web-web-a). Web only — the API is shared from production.
on:
  push:
    branches: [path-a]
  workflow_dispatch:

concurrency:
  group: deploy-path-a
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build web
        run: npm run build:web

      - name: Deploy variant A (a.aubergeduvieuxpont.ca)
        run: npx wrangler deploy --env a
        working-directory: apps/web
