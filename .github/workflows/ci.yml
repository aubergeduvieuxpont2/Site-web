name: CI

# Pull-request gate for main: typecheck the whole monorepo and build the
# frontend. Required status check via branch protection (job: verify).
on:
  pull_request:
    branches: [main]

# Least-privilege GITHUB_TOKEN: this workflow only needs to read the repo.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Typecheck (all workspaces)
        run: npm run typecheck

      - name: Test (all workspaces)
        run: npm test --workspaces --if-present

      # Deploy-safety gates: neither `tsc` nor vitest catch Cloudflare Worker
      # startup errors. (1) A static guard for global-scope async I/O / crypto /
      # timers — the exact class that broke every deploy in #53 (wrangler error
      # 10021), which `wrangler deploy --dry-run` does NOT catch. (2) A dry-run
      # bundle of each Worker to catch build/config breakage before the deploy
      # pipeline. Neither needs a Cloudflare token (keeps this PR job token-free,
      # per finding H4).
      - name: Check Worker global scope
        run: node scripts/check-worker-global-scope.mjs

      - name: Validate Worker bundles (wrangler dry-run)
        run: |
          (cd apps/api && npx wrangler deploy --dry-run)
          (cd apps/hubspot && npx wrangler deploy --dry-run)
          (cd apps/email-ingest && npx wrangler deploy --dry-run)

      - name: Build web
        run: npm run build:web
