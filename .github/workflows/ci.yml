name: CI

# Pull-request gate for main: typecheck the whole monorepo and build the
# frontend. Required status check via branch protection (job: verify).
on:
  pull_request:
    branches: [main]

# Least-privilege GITHUB_TOKEN: this workflow only needs to read the repo.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Typecheck (all workspaces)
        run: npm run typecheck

      - name: Test (all workspaces)
        run: npm test --workspaces --if-present

      - name: Build web
        run: npm run build:web
