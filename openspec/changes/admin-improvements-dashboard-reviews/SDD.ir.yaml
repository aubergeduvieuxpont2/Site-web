DATA:
  migration 0037_settings_review_request_toggle: seed email_review_request_enabled=false
    (ON CONFLICT DO NOTHING)
  migration 0038_reservations_code: ADD COLUMN IF NOT EXISTS code TEXT; SQL backfill
    via md5; CREATE UNIQUE INDEX IF NOT EXISTS reservations_code_key
  migration 0039_reviews: CREATE TABLE IF NOT EXISTS reviews + status/created index
  migration 0040_review_requests: CREATE TABLE IF NOT EXISTS review_requests
  reviews_status_created_idx: index on reviews(status, created_at desc)
TEST:
  T-UX-001a:
    verifies: R-UX-001
    behaviour: tabs-inner has scrollbar-hiding CSS and no desktop overflow class
    steps:
    - render admin page
    - assert scrollbar-width none rule present
  T-UX-002a:
    verifies: R-UX-002
    behaviour: AdminParametresTab renders five cards and one save button
    steps:
    - render component
    - assert five card headings
    - click save
    - assert adminUpdateSettings called once
  T-UX-003a:
    verifies: R-UX-003
    behaviour: row click opens detail modal
    steps:
    - render row
    - click row
    - assert onopen emitted with row
  T-UX-003b:
    verifies: R-UX-003
    behaviour: action buttons stopPropagation
    steps:
    - render row
    - click Confirmer
    - assert onopen not emitted and status handler called
  T-UX-004a:
    verifies: R-UX-004
    behaviour: Modal traps focus, closes on Escape, returns focus
    steps:
    - open Modal
    - Tab cycles within
    - press Escape
    - assert closed and focus returned
  T-SET-001a:
    verifies: R-SET-001
    behaviour: emailReviewRequestEnabled round-trips admin settings and is not public
    steps:
    - POST /api/admin/settings with toggle true
    - GET /api/admin/settings assert true
    - GET /api/settings assert key absent
  T-BLK-001a:
    verifies: R-BLK-001
    behaviour: range create expands to per-day rows
    steps:
    - POST /api/admin/blackouts/range 3-day span
    - assert count 3 and 3 rows upserted
  T-BLK-001b:
    verifies: R-BLK-001
    behaviour: invalid span rejected
    steps:
    - POST with start>end -> 400
    - POST with span>366 -> 400
  T-BLK-002a:
    verifies: R-BLK-002
    behaviour: consecutive identical days grouped into one range row
    steps:
    - render list with adjacent identical days
    - assert one range row; differing note -> two rows
  T-DASH-001a:
    verifies: R-DASH-001
    behaviour: dashboard aggregates on fixtures
    steps:
    - seed confirmed reservations
    - GET /api/admin/dashboard
    - assert guest sums
    - next7Days length 7
    - returningCustomers
  T-DASH-001b:
    verifies: R-DASH-001
    behaviour: occupancy null when denominator 0
    steps:
    - set assignableRoomCount 0
    - assert occupancy currentMonth null
  T-REV-001a:
    verifies: R-REV-001
    behaviour: code generation and backfill uniqueness
    steps:
    - generate many codes assert format and no dup; assert new insert sets code
  T-REV-002a:
    verifies: R-REV-002
    behaviour: eligibility rules and generic invalid response
    steps:
    - valid departed code -> eligible true firstName; unknown code -> generic eligible
      false
  T-REV-002b:
    verifies: R-REV-002
    behaviour: submit masks name and snapshots stays/nights, 409 on repeat
    steps:
    - POST /api/reviews valid -> pending review display_name masked; repeat -> 409
  T-REV-002c:
    verifies: R-REV-002
    behaviour: rating and body validation
    steps:
    - rating 0 or 6 -> 400; body length 9 or 2001 -> 400
  T-REV-003a:
    verifies: R-REV-003
    behaviour: cron enqueues within window and dedupes
    steps:
    - seed departed confirmed reservation toggle on
    - run pass
    - assert review_requests row + email enqueued; run again assert no re-enqueue;
      toggle off assert none
  T-REV-004a:
    verifies: R-REV-004
    behaviour: moderation transitions
    steps:
    - PATCH pending->approved sets moderated_at; approved->rejected allowed
  T-REV-005a:
    verifies: R-REV-005
    behaviour: public list approved only with average and empty strip
    steps:
    - GET /api/reviews returns approved only + averageRating; ReviewsStrip renders
      nothing when empty
NFR:
  responsiveness: every touched screen renders at 375, 1024, 1280px
  security: public review endpoints rate-limited on cf-connecting-ip; no data leak
    for invalid codes; masked identity only
  correctness: dashboard SQL null-safe; review submit idempotent-safe via unique constraint
  compatibility: no new runtime deps; Crockford base32 on crypto.getRandomValues;
    backfill uses built-in md5
  testing: npm run typecheck green; all api and web vitest suites pass
