REQ:
  R-UX-001:
    actor: Admin user
    capability: use the admin tab nav without a visible scrollbar and without desktop
      overflow
    constraints: keep overflow-x auto for mobile; fit row at 1280 and 1024px; scrollable
      at 375px
    priority: MUST
    tests:
    - T-UX-001a
  R-UX-002:
    actor: Admin user
    capability: edit all settings in five grouped cards with one save button
    constraints: password change keeps its own button; existing field behavior unchanged
    priority: MUST
    tests:
    - T-UX-002a
  R-UX-003:
    actor: Admin user
    capability: open a reservation detail modal from a compact table row
    constraints: Confirmer/Annuler stay in-row and do not open the modal; Enter/Space
      open it
    priority: MUST
    tests:
    - T-UX-003a
    - T-UX-003b
  R-UX-004:
    actor: Developer
    capability: reuse a shared Modal component with portal, focus trap, Escape, focus
      return
    constraints: RoomAssignmentDrawer refactored onto it with no behavior change
    priority: MUST
    tests:
    - T-UX-004a
  R-SET-001:
    actor: Admin user
    capability: "toggle email_review_request_enabled in Param\xE8tres"
    constraints: default false; round-trips admin GET/POST; absent from public settings
    priority: MUST
    tests:
    - T-SET-001a
  R-BLK-001:
    actor: Admin user
    capability: create a blackout over a date range expanded to per-day rows
    constraints: startDate <= endDate; span <= 366 days; single-day endpoints unchanged
    priority: MUST
    tests:
    - T-BLK-001a
    - T-BLK-001b
  R-BLK-002:
    actor: Admin user
    capability: delete a blackout range and see consecutive identical days grouped
      in the list
    constraints: grouping display-only, client-side
    priority: MUST
    tests:
    - T-BLK-002a
  R-DASH-001:
    actor: Admin user
    capability: "view an Aper\xE7u dashboard of guests, availability, occupancy, returning\
      \ customers"
    constraints: "occupancy null when denominator 0; Aper\xE7u is default tab; responsive\
      \ at 375px"
    priority: MUST
    tests:
    - T-DASH-001a
    - T-DASH-001b
  R-REV-001:
    actor: System
    capability: assign a unique human-facing code to every reservation
    constraints: AVP- plus 6 Crockford base32 chars (no 0/1/I/O); backfilled; unique;
      set on new inserts
    priority: MUST
    tests:
    - T-REV-001a
  R-REV-002:
    actor: Guest
    capability: submit one moderated review via a public code-based flow
    constraints: rate-limited; generic errors for invalid codes; masked name; snapshot
      stays/nights; 409 on repeat
    priority: MUST
    tests:
    - T-REV-002a
    - T-REV-002b
    - T-REV-002c
  R-REV-003:
    actor: System
    capability: enqueue review-request emails via cron for recently departed stays
    constraints: gated by email_review_request_enabled; 3-day window; dedupe via review_requests
    priority: MUST
    tests:
    - T-REV-003a
  R-REV-004:
    actor: Admin user
    capability: moderate reviews (approve/reject, re-moderate) with a pending badge
    constraints: default pending filter; PATCH sets status and moderated_at
    priority: MUST
    tests:
    - T-REV-004a
  R-REV-005:
    actor: Public visitor
    capability: view approved reviews on a homepage strip and an /avis page
    constraints: approved only; masked; strip <=3 hidden when empty; average rating
      on /avis; footer link
    priority: MUST
    tests:
    - T-REV-005a
E:
  E-Reservation:
    fields:
      id: bigint
      code: text
      name: text
      first_name: text
      last_name: text
      email: text
      phone: text
      arrive: date
      depart: date
      people: int
      room_count: int
      source: text
      external_ref: text
      status: text
      user_id: bigint
    keys:
    - id
    - code
    invariants:
    - INV-code-unique
    - INV-code-format
  E-Review:
    fields:
      id: bigint
      reservation_id: bigint
      rating: int
      body: text
      status: text
      display_name: text
      stays_count: int
      nights_total: int
      created_at: timestamptz
      moderated_at: timestamptz
    keys:
    - id
    - reservation_id
    invariants:
    - INV-one-review-per-reservation
    - INV-masked-identity
  E-ReviewRequest:
    fields:
      reservation_id: bigint
      channel: text
      sent_at: timestamptz
    keys:
    - reservation_id
    invariants:
    - INV-request-dedupe
  E-BlackoutDate:
    fields:
      date: date
      rooms_blocked: int
      note: text
    keys:
    - date
    invariants: []
  E-Settings:
    fields:
      key: text
      value: text
    keys:
    - key
    invariants: []
OP:
  OP-Blackout.createRange:
    input: '{ startDate, endDate, roomsBlocked, note }'
    auth:
    - admin
    pre:
    - startDate <= endDate
    - span <= 366 days
    err:
    - ERR-VALIDATION
    out: '{ count }'
  OP-Blackout.deleteRange:
    input: '{ start, end }'
    auth:
    - admin
    pre: []
    err:
    - ERR-VALIDATION
    out: '{ deleted }'
  OP-Dashboard.get:
    input: '{}'
    auth:
    - admin
    pre: []
    err: []
    out: '{ guestsThisWeek, guestsLastWeek, next7Days, occupancy, returningCustomers
      }'
  OP-Review.eligibility:
    input: '{ code }'
    auth:
    - public
    pre: []
    err:
    - ERR-GENERIC
    out: '{ eligible, firstName, reason }'
  OP-Review.submit:
    input: '{ code, rating, body }'
    auth:
    - public
    pre:
    - rating between 1 and 5
    - body length 10..2000
    - code eligible
    err:
    - ERR-GENERIC
    - ERR-CONFLICT
    out: '{ ok }'
  OP-Review.publicList:
    input: '{ limit }'
    auth:
    - public
    pre: []
    err: []
    out: '{ reviews, averageRating, total }'
  OP-Review.adminList:
    input: '{ status }'
    auth:
    - admin
    pre: []
    err: []
    out: '{ reviews, pendingCount }'
  OP-Review.moderate:
    input: '{ id, status }'
    auth:
    - admin
    pre:
    - status in approved,rejected
    err:
    - ERR-NOTFOUND
    - ERR-VALIDATION
    out: '{ review }'
  OP-ReviewRequest.cronEnqueue:
    input: '{}'
    auth:
    - system
    pre:
    - email_review_request_enabled true
    err: []
    out: '{ enqueued }'
AUTH:
  admin: authenticated user with role == admin (inline getAuthUser check; 401 unauth,
    403 non-admin)
  public: unauthenticated; rate-limited on cf-connecting-ip via general bucket 30/15min
  system: cron scheduled handler, no user
INV:
  INV-code-unique: every reservations.code is unique (enforced by reservations_code_key)
  INV-code-format: reservations.code matches AVP- plus 6 chars of ABCDEFGHJKLMNPQRSTUVWXYZ23456789
  INV-one-review-per-reservation: at most one review row per reservation_id
  INV-masked-identity: public review output never exposes raw guest name or email
  INV-request-dedupe: at most one review_requests row per reservation_id
  INV-availability-unchanged: blackout ranges expand to per-day rows; availability
    math is untouched
  INV-exports-preserved: index.ts keeps default { fetch, scheduled } and export {
    app }
ERR:
  ERR-VALIDATION:
    code: 400
    meaning: invalid input (dates, span, rating, body, status)
  ERR-GENERIC:
    code: 400
    meaning: generic rejection for invalid or ineligible review code (no data leak)
  ERR-CONFLICT:
    code: 409
    meaning: a review already exists for this reservation
  ERR-NOTFOUND:
    code: 404
    meaning: review not found
  ERR-UNAUTH:
    code: 401
    meaning: not authenticated
  ERR-FORBIDDEN:
    code: 403
    meaning: authenticated but not admin
API:
  POST /api/admin/blackouts/range:
    input: BlackoutRangeCreateBody
    output: '{ count }'
    errors:
    - ERR-VALIDATION
    - ERR-UNAUTH
    - ERR-FORBIDDEN
    auth: admin
  DELETE /api/admin/blackouts/range:
    input: '{ start, end }'
    output: '{ deleted }'
    errors:
    - ERR-VALIDATION
    - ERR-UNAUTH
    - ERR-FORBIDDEN
    auth: admin
  GET /api/admin/dashboard:
    input: '{}'
    output: DashboardResponse
    errors:
    - ERR-UNAUTH
    - ERR-FORBIDDEN
    auth: admin
  GET /api/reviews/eligibility:
    input: '{ code }'
    output: EligibilityResponse
    errors:
    - ERR-GENERIC
    auth: public
  POST /api/reviews:
    input: ReviewSubmitBody
    output: '{ ok }'
    errors:
    - ERR-GENERIC
    - ERR-CONFLICT
    auth: public
  GET /api/reviews:
    input: '{ limit }'
    output: PublicReviewsResponse
    errors: []
    auth: public
  GET /api/admin/reviews:
    input: '{ status }'
    output: AdminReviewsResponse
    errors:
    - ERR-UNAUTH
    - ERR-FORBIDDEN
    auth: admin
  PATCH /api/admin/reviews/:id:
    input: ReviewModerateBody
    output: '{ review }'
    errors:
    - ERR-VALIDATION
    - ERR-NOTFOUND
    - ERR-UNAUTH
    - ERR-FORBIDDEN
    auth: admin
