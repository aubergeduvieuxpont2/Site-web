REQ:
  R-SET-001:
    actor: Admin user
    capability: manage all site settings from grouped Paramètres cards with one save
    constraints: five cards in order; single sticky save; password keeps its own button; emailReviewRequestEnabled surfaced (API already exists)
    priority: MUST
    tests: [T-SET-001a, T-SET-001b]
  R-SET-002:
    actor: Developer
    capability: settings.test.ts fixtures match the current SettingsUpdateSchema
    constraints: schema is source of truth; add missing required fields to fixtures; do not weaken schema
    priority: MUST
    tests: [T-SET-002a]
  R-NAV-001:
    actor: Admin user
    capability: use the admin tab bar with no visible scrollbar at desktop and scrollable at 375px
    constraints: scrollbar-width none + ::-webkit-scrollbar display none; overflow-x auto kept; fits at 1280/1024px
    priority: MUST
    tests: [T-NAV-001a]
  R-BLK-001:
    actor: Admin user
    capability: create and delete blocked-date ranges
    constraints: validate ISO dates, startDate<=endDate, span<=366d; expand to per-day upserts; single-day endpoints unchanged
    priority: MUST
    tests: [T-BLK-001a, T-BLK-001b]
  R-BLK-002:
    actor: Admin user
    capability: see consecutive identical blocked days grouped into one range row
    constraints: identical rooms_blocked AND note; client-side display only; range delete
    priority: MUST
    tests: [T-BLK-002a]
  R-DASH-001:
    actor: Admin user
    capability: view an Aperçu dashboard as the default landing tab
    constraints: stat cards + 7-day strip; null occupancy renders em dash; responsive 375px
    priority: MUST
    tests: [T-DASH-001a, T-DASH-001b]
  R-REV-001:
    actor: System
    capability: assign a unique human-facing code to every reservation
    constraints: AVP- + 6-char Crockford base32 (no 0 1 I O); backfill existing rows SQL-side; generate at both insert sites
    priority: MUST
    tests: [T-REV-001a, T-REV-001b]
  R-REV-002:
    actor: Guest
    capability: check eligibility and submit one moderated review per stay without login
    constraints: rating 1-5, body 10-2000; masked display_name; snapshot stays/nights; 409 on repeat; generic errors on invalid code; rate-limited
    priority: MUST
    tests: [T-REV-002a, T-REV-002b, T-REV-002c]
  R-REV-003:
    actor: Admin user
    capability: moderate reviews from an Avis tab with a pending-count badge
    constraints: status filter default pending; approve/reject; re-moderation allowed
    priority: MUST
    tests: [T-REV-003a]
  R-REV-004:
    actor: Any visitor
    capability: see approved reviews on the homepage strip and /avis page
    constraints: approved only newest-first; strip <=3 hidden when empty; /avis average header; footer link
    priority: MUST
    tests: [T-REV-004a, T-REV-004b]
  R-REV-005:
    actor: System (cron)
    capability: enqueue review-request emails for recently departed stays
    constraints: confirmed, departed <=3d, has email, no request row, no review; gated by email_review_request_enabled; runs before drainEmailOutbox; deduped by PK
    priority: MUST
    tests: [T-REV-005a]

E:
  E-Settings:
    fields:
      key: text
      value: text
    invariants: [INV-schema-fixture-parity]
  E-BlackoutDate:
    fields:
      date: date (PK)
      rooms_blocked: integer
      note: text
    invariants: [INV-perday-storage]
  E-Reservation:
    fields:
      id: bigint (PK)
      code: text (unique, AVP-XXXXXX)
      name: text
      email: text
      arrive: date
      depart: date
      people: integer
      room_count: integer
      status: text (pending|confirmed|cancelled)
      user_id: bigint (nullable)
    invariants: [INV-code-unique]
  E-Review:
    fields:
      id: bigint (PK)
      reservation_id: bigint (unique, FK)
      rating: integer (1..5)
      body: text
      status: text (pending|approved|rejected)
      display_name: text (masked)
      stays_count: integer
      nights_total: integer
      created_at: timestamptz
      moderated_at: timestamptz (nullable)
    invariants: [INV-one-review-per-reservation, INV-identity-never-public]
  E-ReviewRequest:
    fields:
      reservation_id: bigint (PK, FK)
      channel: text (default email)
      sent_at: timestamptz
    invariants: [INV-one-request-per-reservation]

OP:
  OP-Blackout.upsertRange:
    input: { startDate: string, endDate: string, roomsBlocked: integer, note: string }
    auth: [admin]
    pre: [valid ISO dates, startDate<=endDate, span<=366]
    err: [ERR-BADRANGE]
    out: { count: integer }
  OP-Blackout.deleteRange:
    input: { start: string, end: string }
    auth: [admin]
    pre: [valid ISO dates, start<=end]
    err: [ERR-BADRANGE]
    out: { deleted: integer }
  OP-Dashboard.get:
    input: {}
    auth: [admin]
    pre: []
    err: []
    out: { guestsThisWeek: integer, guestsLastWeek: integer, next7Days: array, occupancy: object, returningCustomers: integer }
  OP-Review.eligibility:
    input: { code: string }
    auth: [public-ratelimited]
    pre: []
    err: []
    out: { eligible: boolean, firstName: string, reason: string }
  OP-Review.submit:
    input: { code: string, rating: integer, body: string }
    auth: [public-ratelimited]
    pre: [rating 1..5, body 10..2000, eligible]
    err: [ERR-DUPLICATE, ERR-INELIGIBLE]
    out: { ok: true }
  OP-Review.listPublic:
    input: { limit: integer }
    auth: [public]
    pre: []
    err: []
    out: { reviews: array, averageRating: number }
  OP-Review.listAdmin:
    input: { status: string }
    auth: [admin]
    pre: []
    err: []
    out: { reviews: array, pendingCount: integer }
  OP-Review.moderate:
    input: { id: integer, status: string }
    auth: [admin]
    pre: [status in approved|rejected]
    err: [ERR-NOTFOUND]
    out: { review: object }

AUTH:
  admin: authenticated user with role === 'admin' (inline getAuthUser check, no new middleware)
  public: unauthenticated read endpoint
  public-ratelimited: unauthenticated endpoint gated by rateLimitAllow

INV:
  INV-schema-fixture-parity: settings test fixtures must satisfy SettingsUpdateSchema; schema is never weakened to fit tests
  INV-perday-storage: blackout_dates remains one row per day; availability math unchanged
  INV-code-unique: every reservation has a globally unique AVP- code
  INV-one-review-per-reservation: at most one review per reservation (UNIQUE reservation_id)
  INV-one-request-per-reservation: at most one review_request per reservation (PK)
  INV-identity-never-public: raw guest identity is never exposed; only masked display_name

ERR:
  ERR-BADRANGE:
    code: 400
    meaning: invalid or inverted dates, or span exceeds 366 days
  ERR-DUPLICATE:
    code: 409
    meaning: a review already exists for this reservation
  ERR-INELIGIBLE:
    code: 400
    meaning: generic ineligible/invalid code response (no reservation data leaked)
  ERR-NOTFOUND:
    code: 404
    meaning: review not found

API:
  POST /api/admin/blackouts/range:
    input: OP-Blackout.upsertRange
    output: { count: integer }
    errors: [ERR-BADRANGE]
    auth: admin
  DELETE /api/admin/blackouts/range:
    input: OP-Blackout.deleteRange
    output: { deleted: integer }
    errors: [ERR-BADRANGE]
    auth: admin
  GET /api/admin/dashboard:
    input: {}
    output: OP-Dashboard.get
    errors: []
    auth: admin
  GET /api/reviews/eligibility:
    input: { code: string }
    output: { eligible: boolean, firstName: string, reason: string }
    errors: []
    auth: public-ratelimited
  POST /api/reviews:
    input: OP-Review.submit
    output: { ok: true }
    errors: [ERR-DUPLICATE, ERR-INELIGIBLE]
    auth: public-ratelimited
  GET /api/reviews:
    input: { limit: integer }
    output: OP-Review.listPublic
    errors: []
    auth: public
  GET /api/admin/reviews:
    input: { status: string }
    output: OP-Review.listAdmin
    errors: []
    auth: admin
  PATCH /api/admin/reviews/:id:
    input: OP-Review.moderate
    output: { review: object }
    errors: [ERR-NOTFOUND]
    auth: admin

UI:
  screen-admin-shell:
    actions: [selectTab]
    state: { activeTab default apercu }
  screen-apercu:
    actions: [load]
    state: { loading, loaded, error }
  screen-parametres:
    actions: [saveAll, changePassword]
    state: { editing, saving, saved, error }
  screen-disponibilites:
    actions: [upsertRange, deleteRange]
    state: { list, saving }
  screen-avis-admin:
    actions: [filterStatus, approve, reject]
    state: { pending, approved, rejected }
  screen-avis-nouveau:
    actions: [checkEligibility, submit]
    state: { checking, eligible, ineligible, submitting, thanks, error }
  screen-avis-public:
    actions: [load]
    state: { loaded, empty }

DATA:
  0037_settings_review_request_toggle.sql: seed email_review_request_enabled=false (ON CONFLICT DO NOTHING)
  0038_reservations_code.sql: ADD COLUMN IF NOT EXISTS code TEXT; SQL backfill AVP- code; CREATE UNIQUE INDEX IF NOT EXISTS
  0039_reviews.sql: CREATE TABLE IF NOT EXISTS reviews; index on (status, created_at DESC)
  0040_review_requests.sql: CREATE TABLE IF NOT EXISTS review_requests

TEST:
  T-SET-001a:
    verifies: R-SET-001
    behaviour: "AdminParametresTab renders five grouped cards in order with one save button and a separate password button"
    steps: [render tab, assert card headings order, assert single save + separate Changer]
  T-SET-001b:
    verifies: R-SET-001
    behaviour: "save submits all settings and emailReviewRequestEnabled round-trips"
    steps: [toggle review-request, click save, assert adminUpdateSettings payload includes emailReviewRequestEnabled]
  T-SET-002a:
    verifies: R-SET-002
    behaviour: "settings.test.ts is 46/46 green against SettingsUpdateSchema"
    steps: [add missing required fields to fixtures, run vitest test/settings.test.ts, assert 0 failed]
  T-NAV-001a:
    verifies: R-NAV-001
    behaviour: ".page-admin__tabs-inner hides scrollbar and fits full tab row at 1280/1024px, scrollable at 375px"
    steps: [assert scrollbar-width none + webkit rule, assert overflow-x auto retained]
  T-BLK-001a:
    verifies: R-BLK-001
    behaviour: "POST range with startDate>endDate or span>366 returns 400"
    steps: [POST inverted -> 400, POST 400-day span -> 400]
  T-BLK-001b:
    verifies: R-BLK-001
    behaviour: "valid 3-day range upserts 3 per-day rows; single-day endpoints unchanged"
    steps: [POST 3-day range, assert count 3 and 3 rows, PUT single day still works]
  T-BLK-002a:
    verifies: R-BLK-002
    behaviour: "consecutive identical days group into one range row; differing note or gap splits"
    steps: [adjacent identical -> 1 row, adjacent differing note -> 2 rows, gap -> 2 rows]
  T-DASH-001a:
    verifies: R-DASH-001
    behaviour: "GET /api/admin/dashboard returns full payload; occupancy null when denominator 0"
    steps: [fixture reservations, assert guest sums overlap edges, assert occupancy null on zero denominator]
  T-DASH-001b:
    verifies: R-DASH-001
    behaviour: "Aperçu tab is default activeTab and renders em dash for null occupancy"
    steps: [render admin shell, assert activeTab apercu, mock null occupancy -> em dash]
  T-REV-001a:
    verifies: R-REV-001
    behaviour: "generated code matches ^AVP-[ABCDEFGHJKLMNPQRSTUVWXYZ23456789]{6}$ and retries on collision"
    steps: [generate many codes, assert format + uniqueness, simulate collision -> retry]
  T-REV-001b:
    verifies: R-REV-001
    behaviour: "migration 0038 backfills all rows and is idempotent"
    steps: [run migration twice, assert all rows have unique code, second run no-op]
  T-REV-002a:
    verifies: R-REV-002
    behaviour: "eligibility generic on invalid code; eligible only when departed+not cancelled+no review"
    steps: [invalid code -> generic, valid departed -> eligible with firstName]
  T-REV-002b:
    verifies: R-REV-002
    behaviour: "submit masks display_name and snapshots stays/nights from multiple confirmed stays"
    steps: [two confirmed departed stays, submit, assert display_name 'Marie T.' and stays_count/nights_total]
  T-REV-002c:
    verifies: R-REV-002
    behaviour: "second submit for same reservation returns 409"
    steps: [submit once, submit again -> 409]
  T-REV-003a:
    verifies: R-REV-003
    behaviour: "admin list filters by status and PATCH moderates + refreshes pending badge; re-moderation allowed"
    steps: [GET status=pending, PATCH approve, assert pendingCount decremented, PATCH back to rejected]
  T-REV-004a:
    verifies: R-REV-004
    behaviour: "GET /api/reviews returns approved only newest-first with averageRating"
    steps: [seed approved+pending, GET, assert only approved and ordering]
  T-REV-004b:
    verifies: R-REV-004
    behaviour: "homepage strip shows <=3 approved and is hidden when none"
    steps: [zero approved -> strip absent, three approved -> strip present]
  T-REV-005a:
    verifies: R-REV-005
    behaviour: "cron enqueues review-request for eligible departed stays and dedupes on rerun; gated by toggle"
    steps: [toggle on -> insert request + enqueue, rerun -> no duplicate, toggle off -> none]

NFR:
  security: admin endpoints gated by inline getAuthUser + role admin; public review endpoints rate-limited; invalid codes leak no reservation data
  reliability: all migrations idempotent; review submission idempotent-safe via unique constraint
  responsiveness: every touched screen usable at 375px; French copy
  observability: reuse existing email_outbox + admin_audit patterns; no new telemetry

