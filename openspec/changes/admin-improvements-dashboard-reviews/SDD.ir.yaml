STATE:
  ST-01:
    status: locked
    decision: email_review_request_enabled migration + settings.ts wiring ship in
      WS-A (option a)
    rationale: "keeps the Param\xE8tres card self-contained; WS-D only reads the toggle"
  ST-02:
    status: locked
    decision: reservation code backfilled SQL-side with built-in md5, then a unique
      index enforces it
    rationale: avoids pgcrypto dependency; index is the collision safety net
  ST-03:
    status: locked
    decision: occupancy numerator counts room_count times overlap-nights per confirmed
      reservation
    rationale: room-nights per spec; null when denominator 0
  ST-04:
    status: locked
    decision: Modal.svelte extracted and RoomAssignmentDrawer refactored before the
      detail modal is built
    rationale: both consume the same component
