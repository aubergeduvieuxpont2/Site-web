REQ:
  R-TEST-001:
    actor: API maintainer
    capability: app-level integration tests that fail if any reviews/dashboard route becomes unmounted
    constraints: import the real Hono app; stub neon; assert non-404 mount + auth gating + contract
    priority: MUST
    tests: [T-REV-001a, T-REV-001b, T-DASH-001a]
  R-REV-002:
    actor: Public guest
    capability: eligibility + submission behave per spec through the mounted routes
    constraints: generic responses for invalid codes; 201 then 409 on repeat; masked display_name
    priority: MUST
    tests: [T-REV-002a, T-REV-002b, T-REV-002c]
  R-MOD-003:
    actor: Admin user
    capability: list + moderate reviews through admin-gated routes
    constraints: 401 anon / 403 guest / 200 admin; re-moderation allowed; pendingCount for badge
    priority: MUST
    tests: [T-MOD-003a, T-MOD-003b]
  R-DASH-004:
    actor: Admin user
    capability: dashboard payload served with null-safe occupancy ratios
    constraints: 401/403/200 gating; five payload keys; null ratio when denominator 0
    priority: MUST
    tests: [T-DASH-001a, T-DASH-001b]
  R-CONF-005:
    actor: Web maintainer
    capability: typed api.ts client fns for eligibility/public/admin reviews; components routed through them
    constraints: no behavior change; no inline fetch to /api/reviews in review components
    priority: SHOULD
    tests: [T-CONF-005a]
  R-VER-006:
    actor: Reviewer
    capability: verify already-wired toggle, blackout ranges, code gen, cron order, migration idempotency, 375px
    constraints: fix in place only on proven defect; migrations not renumbered
    priority: MUST
    tests: [T-VER-006a]

E:
  E-Review:
    fields:
      id: bigint
      reservation_id: bigint (UNIQUE)
      rating: int (1..5)
      body: text (10..2000)
      status: text (pending|approved|rejected)
      display_name: text (server-masked)
      stays_count: int (snapshot)
      nights_total: int (snapshot)
      created_at: timestamptz
      moderated_at: timestamptz|null
    invariants: [INV-masked-identity, INV-one-review-per-reservation]
  E-ReviewRequest:
    fields:
      reservation_id: bigint (PK)
      channel: text (default 'email')
      sent_at: timestamptz
    invariants: [INV-request-dedupe]
  E-ReservationCode:
    fields:
      code: text (UNIQUE, 'AVP-'+6 Crockford base32)
    invariants: [INV-code-format]

OP:
  OP-Reviews.eligibility:
    input: { code: string }
    auth: [public-rate-limited]
    pre: []
    err: [ERR-BADREQUEST]
    out: { eligible: boolean, firstName: "string?" }
  OP-Reviews.submit:
    input: { code: string, rating: int, body: string }
    auth: [public-rate-limited]
    pre: [reservation departed, not cancelled, no existing review]
    err: [ERR-BADREQUEST, ERR-CONFLICT]
    out: { ok: true }
  OP-Reviews.listPublic:
    input: { limit: "int?" }
    auth: [public]
    pre: []
    err: []
    out: { reviews: array, averageRating: "number|null", total: int }
  OP-Reviews.listAdmin:
    input: { status: "string?" }
    auth: [admin]
    pre: []
    err: [ERR-UNAUTHORIZED, ERR-FORBIDDEN]
    out: { reviews: array, pendingCount: int }
  OP-Reviews.moderate:
    input: { id: int, status: "approved|rejected" }
    auth: [admin]
    pre: [review exists]
    err: [ERR-UNAUTHORIZED, ERR-FORBIDDEN, ERR-BADREQUEST, ERR-NOTFOUND]
    out: { review: object }
  OP-Dashboard.get:
    input: {}
    auth: [admin]
    pre: []
    err: [ERR-UNAUTHORIZED, ERR-FORBIDDEN]
    out: { guestsThisWeek: int, guestsLastWeek: int, next7Days: array, occupancy: object, returningCustomers: int }

AUTH:
  public: no authentication required
  public-rate-limited: no auth; general rate-limit bucket (30 req / 15 min per IP)
  admin: getAuthUser resolves a session whose user.role === 'admin'

INV:
  INV-masked-identity: public review responses never expose raw guest name/email; display_name is pre-masked
  INV-one-review-per-reservation: reviews.reservation_id is UNIQUE; a second submit yields 409
  INV-request-dedupe: cron never enqueues a review-request for a reservation already in review_requests or with a review
  INV-code-format: reservation.code is 'AVP-' + 6 Crockford base32 chars (no 0/O/1/I), UNIQUE
  INV-route-mounted: every review/dashboard route resolves on the exported app (never 404 for a valid method+path)

ERR:
  ERR-BADREQUEST: { code: 400, meaning: missing/invalid input or ineligible code (generic) }
  ERR-UNAUTHORIZED: { code: 401, meaning: no authenticated session }
  ERR-FORBIDDEN: { code: 403, meaning: authenticated but not admin }
  ERR-NOTFOUND: { code: 404, meaning: no matching row/route }
  ERR-CONFLICT: { code: 409, meaning: review already exists for reservation }

API:
  GET /api/reviews/eligibility:
    input: code (query)
    output: EligibilityResponse
    errors: [ERR-BADREQUEST]
    auth: public-rate-limited
  POST /api/reviews:
    input: { code, rating, body }
    output: { ok: true }
    errors: [ERR-BADREQUEST, ERR-CONFLICT]
    auth: public-rate-limited
  GET /api/reviews:
    input: limit (query, optional)
    output: PublicReviewsResponse
    errors: []
    auth: public
  GET /api/admin/reviews:
    input: status (query, optional)
    output: AdminReviewsResponse
    errors: [ERR-UNAUTHORIZED, ERR-FORBIDDEN]
    auth: admin
  PATCH /api/admin/reviews/{id}:
    input: { status }
    output: { review }
    errors: [ERR-UNAUTHORIZED, ERR-FORBIDDEN, ERR-BADREQUEST, ERR-NOTFOUND]
    auth: admin
  GET /api/admin/dashboard:
    input: {}
    output: DashboardResponse
    errors: [ERR-UNAUTHORIZED, ERR-FORBIDDEN]
    auth: admin

UI:
  screen-avis-nouveau:
    actions: [checkEligibility, submitReview]
    state: { loading, eligible, ineligible, submitting, thanks, error }
  screen-avis:
    actions: [loadApproved]
    state: { loading, loaded, empty }
  strip-reviews:
    actions: [loadTop3]
    state: { hidden-when-empty, loaded }
  tab-avis:
    actions: [filterByStatus, approve, reject]
    state: { pending-default, badge-count }
  tab-apercu:
    actions: [loadDashboard]
    state: { loading, loaded, null-ratio-dash }

DATA:
  migrations: 0037_settings_review_request_toggle, 0038_reservations_code, 0039_reviews, 0040_review_requests (existing; audited, not renumbered)
  reviews table: id, reservation_id UNIQUE, rating, body, status, display_name, stays_count, nights_total, created_at, moderated_at
  review_requests table: reservation_id PK, channel default 'email', sent_at
  reservations.code: TEXT UNIQUE, backfilled before UNIQUE enforced

TEST:
  T-REV-001a:
    verifies: R-TEST-001
    behaviour: "each reviews route returns non-404 mounted status via app.request"
    steps:
      - import { app } from index; stub neon
      - request GET/POST/PATCH each reviews path -> assert status !== 404
  T-REV-001b:
    verifies: R-TEST-001
    behaviour: "removing an app.route mount makes a route 404 and fails the mount guard"
    steps:
      - conceptual guard; mount-guard assertion covers regression
  T-REV-002a:
    verifies: R-REV-002
    behaviour: "eligibility generic for invalid code, 400 for missing code"
    steps:
      - GET /api/reviews/eligibility?code=UNKNOWN -> 200 { eligible:false }, no reservation fields
      - GET /api/reviews/eligibility -> 400
  T-REV-002b:
    verifies: R-REV-002
    behaviour: "submit 201 then 409 on uniqueness error; 400 on invalid input"
    steps:
      - POST /api/reviews valid eligible -> 201
      - POST /api/reviews with unique-error stub -> 409
      - POST /api/reviews rating 6 / body 3 chars -> 400
  T-REV-002c:
    verifies: R-REV-002
    behaviour: "GET /api/reviews returns approved-only public shape + averageRating"
    steps:
      - GET /api/reviews -> 200 { reviews, averageRating, total }; SQL filters status='approved'
  T-MOD-003a:
    verifies: R-MOD-003
    behaviour: "GET /api/admin/reviews gated 401/403/200 with reviews + pendingCount"
    steps:
      - anon -> 401; guest -> 403; admin -> 200 { reviews, pendingCount }
  T-MOD-003b:
    verifies: R-MOD-003
    behaviour: "PATCH /api/admin/reviews/:id gated + 400 bad id + 404 no row + 200 approve"
    steps:
      - anon -> 401; guest -> 403; bad id -> 400; no row -> 404; admin approve -> 200 { review }
  T-DASH-001a:
    verifies: R-DASH-004
    behaviour: "GET /api/admin/dashboard gated 401/403/200 with five payload keys"
    steps:
      - anon -> 401; guest -> 403; admin -> 200 with guestsThisWeek/guestsLastWeek/next7Days/occupancy/returningCustomers
  T-DASH-001b:
    verifies: R-DASH-004
    behaviour: "occupancy.currentMonth null when assignableRoomCount 0"
    steps:
      - settings stub assignableRoomCount=0 -> admin dashboard -> occupancy.currentMonth === null
  T-CONF-005a:
    verifies: R-CONF-005
    behaviour: "api.ts exports the three client fns; review components use them not inline fetch"
    steps:
      - assert reviewEligibility/publicReviews/adminReviews exported
      - grep review components for fetch(\"/api/reviews -> none
  T-VER-006a:
    verifies: R-VER-006
    behaviour: "whole-repo typecheck clean + all vitest suites green incl Task 1 + new suites; 375px verified"
    steps:
      - npm run typecheck -> exit 0
      - vitest apps/api + apps/web -> all pass, none skipped

NFR:
  security: eligibility generic for invalid codes; display_name masked server-side; generic 500 boundary
  reliability: integration tests hermetic (neon stubbed); no live DB
  observability: unchanged; unhandled errors logged by name only
  performance: admin-only/low-traffic; no caching; rate-limit preserved on public endpoints

FILE:
  apps/api/src/reviewsRoutes.test.ts: TASK-api-tests
  apps/api/src/dashboardRoute.test.ts: TASK-api-tests
  apps/web/src/lib/api.ts: TASK-web-conformance
  apps/web/src/routes/avis/**: TASK-web-conformance
  apps/web/src/lib/components/ReviewsStrip.svelte: TASK-web-conformance
  apps/web/src/lib/components/admin/AdminAvisTab.svelte: TASK-web-conformance

TASK:
  TASK-api-tests:
    scope:
      - R-TEST-001
      - R-REV-002
      - R-MOD-003
      - R-DASH-004
      - OP-Reviews.eligibility
      - OP-Reviews.submit
      - OP-Reviews.listPublic
      - OP-Reviews.listAdmin
      - OP-Reviews.moderate
      - OP-Dashboard.get
      - AUTH
      - ERR-BADREQUEST
      - ERR-UNAUTHORIZED
      - ERR-FORBIDDEN
      - ERR-NOTFOUND
      - ERR-CONFLICT
      - T-REV-001a
      - T-REV-001b
      - T-REV-002a
      - T-REV-002b
      - T-REV-002c
      - T-MOD-003a
      - T-MOD-003b
      - T-DASH-001a
      - T-DASH-001b
    files: [apps/api/src/reviewsRoutes.test.ts, apps/api/src/dashboardRoute.test.ts]
    must_preserve:
      - INV-route-mounted
      - INV-masked-identity
      - INV-one-review-per-reservation
    produce: [tests]
    verifies: [R-TEST-001, R-REV-002, R-MOD-003, R-DASH-004]
  TASK-web-conformance:
    scope:
      - R-CONF-005
      - UI
      - T-CONF-005a
    files:
      - apps/web/src/lib/api.ts
      - apps/web/src/routes/avis/**
      - apps/web/src/lib/components/ReviewsStrip.svelte
      - apps/web/src/lib/components/admin/AdminAvisTab.svelte
    must_preserve:
      - INV-masked-identity
    produce: [code, tests]
    verifies: [R-CONF-005]
  TASK-verify:
    scope:
      - R-VER-006
      - DATA
      - INV-code-format
      - INV-request-dedupe
      - T-VER-006a
    files: []
    must_preserve:
      - INV-code-format
      - INV-request-dedupe
    produce: [verification]
    verifies: [R-VER-006]

STATE:
  ST-01:
    status: locked
    decision: All six review/dashboard routes are mounted and functional at HEAD via app.route sub-routers; no restore/inline needed.
    rationale: "app.request probe returned 401/500 (never 404) for all six; control path returned 404. Matches accepted createEmailsRouter pattern."
  ST-02:
    status: locked
    decision: Keep sub-router mounting; add app-level integration tests as the anti-regression guard instead of inlining.
    rationale: "inlining working, module-tested code is churn = the exact regression risk that got the prior team rejected. The real gap is test topology, not wiring."
  ST-03:
    status: locked
    decision: Reuse the blackoutsRange.test.ts harness (vi.hoisted neon mock + per-test SQL stubs) for the new tests.
    rationale: "hermetic, no live DB, consistent with the existing accepted integration test."
  ST-04:
    status: open
    question: "Should api.ts also add a thin reservationCode/dashboard type export, or is adminGetDashboard's existing type sufficient?"
    options: [reuse-existing, add-explicit-exports]
