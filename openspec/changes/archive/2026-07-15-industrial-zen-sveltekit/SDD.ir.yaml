    rationale: "per-route SSG/SSR/CSR requires the SvelteKit Worker to own routing"
  ST-02:
    status: locked
    decision: "sessions store only the sha-256 hash of an opaque token; cookies are HttpOnly Secure SameSite=Lax host-scoped"
    rationale: "a DB leak yields no usable tokens; host-scoping keeps auth on www only"
  ST-03:
    status: locked
    decision: "admin bootstrap via idempotent 0006_admin_seed.sql substituting :ADMIN_EMAIL in the migration runner, not a login-time allowlist"
    rationale: "migrations remain the single source of truth; safe to re-run"
  ST-04:
    status: locked
    decision: "two gateway read ops wired through the union, enum, and registry map together with a widened execute return that adds optional data"
    rationale: "the registry is a strict typed union; partial edits fail typecheck"
  ST-05:
    status: locked
    decision: "sliding session TTL: 30-day expiry renewed on authenticated activity (expires_at pushed forward at most once per hour to limit writes)"
    rationale: "guest-facing site favors staying signed in; sliding renewal keeps active users logged in while idle sessions still expire; hourly cap avoids a DB write per request"
