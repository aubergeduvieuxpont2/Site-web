TASK:
  TASK-migrations:
    scope:
      - R-PROF-001
      - R-ROOM-001
      - R-PWD-003
    files:
      - apps/api/migrations/0008_users_profile_fields.sql
      - apps/api/migrations/0009_room_visibility.sql
      - apps/api/migrations/0010_password_reset_tokens.sql
    must_preserve:
      - INV-token-hashed
    produce: [migrations]
    verifies: [R-PROF-001]
  TASK-api-auth:
    scope:
      - R-PWD-003
    files:
      - apps/api/src/auth/session.ts
    must_preserve:
      - INV-token-hashed
      - INV-token-single-use
    produce: [code]
    verifies: [R-PWD-003]
  TASK-api-settings:
    scope:
      - R-SET-001
    files:
      - apps/api/src/settings.ts
      - apps/api/test/settings.test.ts
    must_preserve:
      - INV-settings-two-keys
    produce: [code, tests]
    verifies: [R-SET-001]
  TASK-hubspot:
    scope:
      - R-HS-001
    files:
      - apps/hubspot/src/ops/contact.ts
      - apps/hubspot/test/ops.test.ts
    must_preserve: []
    produce: [code, tests]
    verifies: [R-HS-001]
  TASK-api-routes:
    scope:
      - R-PROF-001
      - R-PROF-002
      - R-PROF-003
      - R-PWD-001
      - R-PWD-002
      - R-PWD-003
      - R-ROOM-001
      - R-ROOM-002
      - R-ADM-001
      - R-ADM-002
      - R-ADM-003
    files:
      - apps/api/src/index.ts
      - apps/api/test/**
    must_preserve:
      - INV-no-enumeration
      - INV-name-derived
      - INV-token-single-use
    produce: [code, tests]
    verifies: [R-PROF-002, R-PWD-001, R-PWD-002, R-ROOM-002, R-ADM-002]
  TASK-web-api:
    scope:
      - R-SET-001
      - R-ROOM-001
      - R-PWD-001
    files:
      - apps/web/src/lib/api.ts
      - apps/web/src/lib/settings.svelte.ts
      - apps/web/src/lib/__tests__/settings.test.ts
    must_preserve:
      - INV-secret-free-frontend
    produce: [code, tests]
    verifies: [R-SET-001]
  TASK-web-nav:
    scope:
      - R-NAV-001
      - R-SET-001
    files:
      - apps/web/src/lib/components/Nav.svelte
      - apps/web/src/routes/+page.svelte
    must_preserve: []
    produce: [code]
    verifies: [R-NAV-001]
  TASK-web-auth:
    scope:
      - R-PROF-001
      - R-PWD-002
      - R-PWD-003
    files:
      - apps/web/src/routes/connexion/**
      - apps/web/src/routes/reinitialisation/**
    must_preserve:
      - INV-no-enumeration
    produce: [code, tests]
    verifies: [R-PROF-001, R-PWD-003]
  TASK-web-profil:
    scope:
      - R-PROF-003
      - R-PWD-001
      - R-NAV-001
    files:
      - apps/web/src/routes/profil/**
    must_preserve: []
    produce: [code, tests]
    verifies: [R-PROF-003, R-PWD-001]
  TASK-web-admin:
    scope:
      - R-SET-001
      - R-ROOM-002
      - R-ADM-001
      - R-ADM-002
      - R-ADM-003
      - R-PWD-001
    files:
      - apps/web/src/routes/admin/**
      - apps/web/src/routes/__tests__/**
    must_preserve: []
    produce: [code, tests]
    verifies: [R-ROOM-002, R-ADM-002, R-ADM-003]
  TASK-web-rooms:
    scope:
      - R-ROOM-001
      - R-ROOM-002
    files:
      - apps/web/src/routes/le-site/**
    must_preserve:
      - INV-rooms-public-shape
    produce: [code, tests]
    verifies: [R-ROOM-001]

STATE:
  ST-01:
    status: locked
    decision: Reset tokens reuse generateToken and sha256hex; only the hash is stored
    rationale: "mirrors the sessions table; no new crypto surface"
  ST-02:
    status: locked
    decision: Removing the two room-count settings keys is code-only with no down migration
    rationale: "lingering rows are harmless; avoids a destructive migration"
  ST-03:
    status: locked
    decision: users.name stays the derived source of truth for display and HubSpot name
    rationale: "keeps every existing consumer backward compatible"
  ST-04:
    status: locked
    decision: A successful password reset invalidates all sessions for that user
    rationale: "limits blast radius if a token leaked"
  ST-05:
    status: locked
    decision: "Forgot rate limiting is enforced per-IP and per-email (both)"
    rationale: "per-email throttling blocks targeted token-flooding of one account even from many IPs; reuses the existing rate-limiter pattern"
