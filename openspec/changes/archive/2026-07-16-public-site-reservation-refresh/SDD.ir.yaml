STATE:
  ST-01:
    status: locked
    decision: "Build the shared auth store (auth.svelte.ts) before the nav, contact, and logout work"
    rationale: "changes 5, 8, and 9 all read it; mirrors the proven settings.svelte.ts state pattern"
  ST-02:
    status: locked
    decision: "Fix footer visibility by binding class:footer--visible to a $state flag toggled by the observer"
    rationale: "the selector was pruned because it only appeared via imperative classList; a markup binding retains it and keeps the reveal animation"
  ST-03:
    status: locked
    decision: "Expose the live room count as publicRoomCount on GET /api/settings computed from rooms, not a stored setting"
    rationale: "the marketing_room_count setting does not exist server-side; counting rides the existing settings fetch with a static 12 fallback"
  ST-04:
    status: locked
    decision: "Widen the reservation schema to accept checkIn/checkOut/guests and map them to arrive/depart/people alongside the new fields"
    rationale: "the frontend already sends these keys and the API silently drops them today; aligning the contract makes all fields persist"
  ST-05:
    status: locked
    decision: "Keep reservations.name populated as a derived first+last value; new columns are nullable"
    rationale: "name is NOT NULL and backs existing admin/profile views; additive nullable columns avoid a destructive change"
  ST-06:
    status: locked
    decision: "Remove only the per-room CTA from RoomCard, leaving the informational card intact"
    rationale: "matches the already-showcase le-site#chambres and funnels bookings through the single global Reserver flow"
