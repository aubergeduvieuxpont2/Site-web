STATE:
  ST-01:
    status: locked
    decision: rooms primary key is slug TEXT, derived server-side via slugify(name)
    rationale: preserves /api/admin/rooms/:slug and /api/rooms slug contracts; admins never hand-craft slugs
  ST-02:
    status: locked
    decision: validate room image_key against a fixed ROOM_IMAGE_KEYS allow-list, not img/utils validateKey
    rationale: validateKey regex rejects dashes, which most real R2 keys contain; allow-list is stricter and matches the admin select
  ST-03:
    status: locked
    decision: room_visibility is retired at the code level but not dropped by any migration
    rationale: CLAUDE.md prefers non-destructive migrations; the new rooms table re-seeds all defaults
  ST-04:
    status: locked
    decision: link hubspot id to users in scheduled.ts after markDelivered, gated on kind contact.upsert, best-effort
    rationale: the delivery path already holds kind, payload email, and result hubspotId; guard so linking never fails delivery
  ST-05:
    status: locked
    decision: preserve the #chambres anchor id on le-site while replacing its content with the property overview
    rationale: keeps the /chambres redirect and in-page nav working with no extra changes
  ST-06:
    status: locked
    decision: model the le-site overview as a static PROPERTY_AREAS constant in content.ts, decoupled from the rooms inventory
    rationale: public imagery is editorial and no longer maps 1:1 to internal inventory
