TASK:
  TASK-migrations:
    scope: [R-PRICE-001, R-TAX-001, R-ASSIGN-001]
    files:
      - apps/api/migrations/0015_users_pricing.sql
      - apps/api/migrations/0016_settings_taxes.sql
      - apps/api/migrations/0017_reservation_room_assignments.sql
    must_preserve: [INV-pricing-exclusive, INV-no-overlap, INV-unique-assignment]
    produce: [migrations]
    verifies: [R-PRICE-001, R-TAX-001, R-ASSIGN-001]
  TASK-api-core:
    scope: [R-PRICE-001, R-TAX-001, R-TAX-002, R-INV-001, R-ASSIGN-001, R-ASSIGN-002, R-ASSIGN-003, T-INV-001a, T-INV-001b, T-TAX-001a, T-TAX-001b, T-TAX-002a, T-PRICE-001a, T-PRICE-001b]
    files:
      - apps/api/src/pricing.ts
      - apps/api/src/assignments.ts
      - apps/api/src/settings.ts
      - apps/api/test/pricing.test.ts
      - apps/api/test/settings.test.ts
    must_preserve: [INV-tax-nonnegative, INV-no-overlap]
    produce: [code, tests]
    verifies: [R-PRICE-001, R-TAX-001, R-TAX-002, R-INV-001]
  TASK-api-endpoints:
    scope: [R-ASSIGN-001, R-ASSIGN-002, R-ASSIGN-003, R-INV-001, R-INV-003, R-PROF-001, R-PROF-002, R-PRICE-001, R-PRICE-003, R-PRICE-004, R-TAX-002, OP-Assignment.create, OP-Assignment.remove, OP-Assignment.freeRooms, OP-Invoice.create, OP-User.get, OP-User.setPricing, OP-Auth.me, OP-Settings.update, ERR-INELIGIBLE, ERR-OVERLAP, ERR-ROOMCOUNT, ERR-INCOMPLETE, ERR-VALIDATION, T-INV-003a, T-PROF-001a, T-PROF-002a, T-PRICE-003a, T-PRICE-004a]
    files: [apps/api/src/index.ts]
    must_preserve: [INV-pricing-exclusive, INV-no-overlap, INV-unique-assignment, INV-tax-nonnegative]
    produce: [code]
    verifies: [R-ASSIGN-001, R-ASSIGN-002, R-ASSIGN-003, R-INV-001, R-INV-003, R-PROF-001, R-PROF-002, R-PRICE-003, R-PRICE-004]
  TASK-hubspot:
    scope: [R-INV-002, R-PROF-001, T-INV-002a]
    files:
      - apps/hubspot/src/ops/invoice.ts
      - apps/hubspot/src/ops/contactGetById.ts
      - apps/hubspot/src/ops/registry.ts
      - apps/hubspot/test/ops.test.ts
    must_preserve: []
    produce: [code, tests]
    verifies: [R-INV-002, R-PROF-001]
  TASK-web-shared:
    scope: [R-DATE-001, R-TAX-001, R-TAX-002, R-PRICE-001, R-PRICE-002]
    files:
      - apps/web/src/lib/api.ts
      - apps/web/src/lib/settings.svelte.ts
      - apps/web/src/lib/content.ts
    must_preserve: []
    produce: [code]
    verifies: [R-DATE-001, R-TAX-002, R-PRICE-002]
  TASK-web-ui:
    scope: [R-DATE-001, R-ASSIGN-001, R-ASSIGN-002, R-INV-001, R-TAX-001, R-PRICE-002, T-DATE-001a, T-DATE-001b, T-PRICE-002a]
    files:
      - apps/web/src/lib/components/RoomCard.svelte
      - apps/web/src/routes/le-site/+page.svelte
      - apps/web/src/routes/admin/+page.svelte
      - apps/web/src/routes/profil/+page.svelte
      - apps/web/src/routes/__tests__/page-admin.test.ts
    must_preserve: []
    produce: [code, tests]
    verifies: [R-DATE-001, R-PRICE-002]
  TASK-web-profile:
    scope: [R-PROF-001, R-PROF-002, R-PRICE-004]
    files:
      - apps/web/src/routes/admin/utilisateurs/[id]/+page.svelte
      - apps/web/src/routes/admin/utilisateurs/[id]/+page.ts
      - apps/web/src/lib/components/admin/AdminUtilisateursTab.svelte
    must_preserve: [INV-pricing-exclusive]
    produce: [code]
    verifies: [R-PROF-001, R-PROF-002, R-PRICE-004]

STATE:
  ST-01:
    status: locked
    decision: "Frontend ReservationRow is corrected to arrive/depart/people; dates parsed date-only for fr-CA display"
    rationale: "the API already returns this contract; the Invalid Date bug is a field-name mismatch, and UTC parsing shifts the day"
  ST-02:
    status: locked
    decision: "Room assignment is keyed by room_slug with a SQL half-open overlap check"
    rationale: "no numeric room id exists; the DB is the single source of truth against races"
  ST-03:
    status: locked
    decision: "Tax percents stored raw as TEXT and validated with a non-negative decimal rule"
    rationale: "settings table is text key/value; 9.975 round-trips as a string; 0 must be allowed"
  ST-04:
    status: locked
    decision: "Invoice and effective-price math live in one pure unit-tested pricing helper with no tax compounding"
    rationale: "endpoint and tests must agree byte-for-byte; brief mandates a shared helper"
  ST-05:
    status: locked
    decision: "contact.getById runs synchronously via execute; invoice.create is enqueued via the outbox"
    rationale: "reads are awaited by the admin; writes must survive portal rejection in the failed state"
  ST-06:
    status: locked
    decision: "Pricing mutual exclusivity enforced in the API validator and admin UI, not a DB CHECK"
    rationale: "keeps the migration trivially idempotent while still guaranteeing the invariant"
  ST-07:
    status: locked
    decision: "The user profile route is client-only with ssr false and prerender false"
    rationale: "it reads a session cookie and admin-only data that must never be prerendered"
