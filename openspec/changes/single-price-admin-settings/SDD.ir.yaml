STATE:
  ST-01:
    status: locked
    decision: settings stored as a key/value table (key, value, updated_at)
    rationale: "matches idempotency convention; add settings without schema churn"
  ST-02:
    status: locked
    decision: public GET exposes only nightly_price, contact_email, marketing_room_count
    rationale: "assignable capacity is operational and must not leak publicly"
  ST-03:
    status: locked
    decision: admin update uses POST (not PUT) and zValidator with a custom error hook
    rationale: "fits existing CORS allowMethods and the repo zValidator rule"
  ST-04:
    status: locked
    decision: RoomCard reads the flat price from the shared settings store
    rationale: "single source; all price displays update together; per-room price data deleted"
  ST-05:
    status: locked
    decision: PRIVACY C-03 email is a static default, not dynamically configurable
    rationale: "contact page is the dynamic render point; keeps scope small"
